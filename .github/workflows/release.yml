name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bun_target: bun-darwin-arm64
            archive_arch: arm64
          - bun_target: bun-darwin-x64
            archive_arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release asset
        env:
          VERSION: ${{ github.ref_name }}
          BUN_TARGET: ${{ matrix.bun_target }}
          ARCHIVE_ARCH: ${{ matrix.archive_arch }}
        run: |
          mkdir -p dist
          bun build \
            --compile \
            --minify \
            --env inline \
            --target="$BUN_TARGET" \
            src/cli.ts \
            --outfile dist/ytfeed

          mkdir -p "release/$ARCHIVE_ARCH"
          cp dist/ytfeed "release/$ARCHIVE_ARCH/ytfeed"
          tar -C "release/$ARCHIVE_ARCH" -czf "dist/ytfeed-${VERSION}-${ARCHIVE_ARCH}-macos.tar.gz" ytfeed

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_arch }}
          path: dist/ytfeed-${{ github.ref_name }}-${{ matrix.archive_arch }}-macos.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          if gh release view "$VERSION" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$VERSION" release-assets/* --repo "$REPO" --clobber
            gh release edit "$VERSION" --repo "$REPO" --title "$VERSION"
          else
            gh release create "$VERSION" release-assets/* --repo "$REPO" --title "$VERSION" --notes ""
          fi
